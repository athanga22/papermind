services:
  # ── FastAPI backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data        # papers, bm25 index, parsed cache
      - ./api:/app/api
      - ./query:/app/query
      - ./ingestion:/app/ingestion
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
    depends_on:
      - api
    restart: unless-stopped

  # ── Vector store ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.16.1
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Observability ─────────────────────────────────────────────────────────
  langfuse-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-changeme}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${LANGFUSE_DATABASE_URL:-postgresql://postgres:changeme@langfuse-db:5432/langfuse}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme-replace-in-prod}
      SALT: ${LANGFUSE_SALT:-changeme-replace-in-prod}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-set-this-in-your-env-file}
      TELEMETRY_ENABLED: "false"
    restart: unless-stopped

volumes:
  qdrant_data:
  langfuse_db_data:
